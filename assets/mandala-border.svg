<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="#FF9933" stroke-width="3"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="#FFD700" stroke-width="1"/>
  
  <!-- Decorative petals - orange -->
  <g stroke="#FF9933" stroke-width="2" fill="none">
    <circle cx="200" cy="50" r="20"/>
    <circle cx="327" cy="73" r="20"/>
    <circle cx="350" cy="200" r="20"/>
    <circle cx="327" cy="327" r="20"/>
    <circle cx="200" cy="350" r="20"/>
    <circle cx="73" cy="327" r="20"/>
    <circle cx="50" cy="200" r="20"/>
    <circle cx="73" cy="73" r="20"/>
  </g>
  
  <!-- Inner decorative circles -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#FF9933" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Lotus elements -->
  <g stroke="#CC0000" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 200 150 Q 180 140 170 160"/>
    <path d="M 200 150 Q 220 140 230 160"/>
    <path d="M 200 250 Q 180 260 170 240"/>
    <path d="M 200 250 Q 220 260 230 240"/>
  </g>
  
  <!-- Center decoration -->
  <circle cx="200" cy="200" r="15" fill="#FFD700"/>
  <circle cx="200" cy="200" r="10" fill="#FF9933"/>
  <circle cx="200" cy="200" r="5" fill="#CC0000"/>
</svg>