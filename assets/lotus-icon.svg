<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer petals (pink/red) -->
  <g fill="#FF69B4" opacity="0.8">
    <ellipse cx="100" cy="40" rx="15" ry="25"/>
    <ellipse cx="145" cy="55" rx="15" ry="25" transform="rotate(60 100 100)"/>
    <ellipse cx="145" cy="145" rx="15" ry="25" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="160" rx="15" ry="25"/>
    <ellipse cx="55" cy="145" rx="15" ry="25" transform="rotate(240 100 100)"/>
    <ellipse cx="55" cy="55" rx="15" ry="25" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Inner petals (orange) -->
  <g fill="#FF9933" opacity="0.9">
    <ellipse cx="100" cy="60" rx="12" ry="20"/>
    <ellipse cx="135" cy="75" rx="12" ry="20" transform="rotate(60 100 100)"/>
    <ellipse cx="135" cy="125" rx="12" ry="20" transform="rotate(120 100 100)"/>
    <ellipse cx="100" cy="140" rx="12" ry="20"/>
    <ellipse cx="65" cy="125" rx="12" ry="20" transform="rotate(240 100 100)"/>
    <ellipse cx="65" cy="75" rx="12" ry="20" transform="rotate(300 100 100)"/>
  </g>
  
  <!-- Center circle (gold) -->
  <circle cx="100" cy="100" r="30" fill="#FFD700"/>
  
  <!-- Inner center (dark) -->
  <circle cx="100" cy="100" r="20" fill="#CC0000" opacity="0.7"/>
  
  <!-- Stamen detail -->
  <circle cx="100" cy="100" r="10" fill="#FFF" opacity="0.8"/>
  <circle cx="100" cy="100" r="5" fill="#FFD700"/>
</svg>